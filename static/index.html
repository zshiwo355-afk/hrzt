<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>怀仁AI智能体</title>
  <link rel="stylesheet" href="/static/css/app.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked@11.1.1/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.0.8/dist/purify.min.js" crossorigin="anonymous"></script>
</head>

<body>
  <div id="lightbox" class="lightbox" onclick="this.classList.remove('show')">
    <img id="lightboxImg" src="" alt="放大预览" />
  </div>

  <div class="login-mask" id="loginMask">
    <div class="login-card">
      <div class="login-kicker">企业内部入口</div>
      <h2 class="login-title">怀仁AI智能体</h2>
      <p class="login-desc">请输入访问密码后进入系统。</p>

      <div class="login-body">
        <div class="login-error" id="loginError"></div>
        <input id="usernameInput" class="login-input" type="text" placeholder="请输入手机号" />
        <input id="passwordInput" class="login-input" type="password" placeholder="请输入访问密码" />
        <button id="loginBtn" class="login-btn">进入智能体</button>
      </div>
    </div>
  </div>

  <div class="poe-shell is-auth-hidden" id="appShell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark">怀</div>
        <div class="brand-title">怀仁AI智能体</div>
      </div>

      <button class="sidebar-new-btn" id="newChatBtn" type="button">
        <span class="sidebar-new-btn-icon" aria-hidden="true"></span>
        <span>新建聊天</span>
      </button>

      <div class="sidebar-section">
        <div class="sidebar-label">模式</div>
        <div class="workspace-tabs">
          <button class="tab-btn" data-tab="text">
            <div class="tab-title">AI 对话</div>
            <div class="tab-desc">多轮文字问答，适合聊天、分析和写作。</div>
          </button>
          <button class="tab-btn" data-tab="image">
            <div class="tab-title">AI 生图</div>
            <div class="tab-desc">选择模型并输入提示词，内容将原样提交给模型。</div>
          </button>
        </div>
      </div>

      <div class="sidebar-section project-list-section" id="projectSection">
        <div class="sidebar-label sidebar-collapsible-header">
          <span>项目</span>
          <span class="sidebar-header-actions">
            <button class="sidebar-collapse-btn" id="projectSectionToggle" type="button" aria-expanded="true" aria-label="收起项目"></button>
          </span>
        </div>
        <div class="sidebar-collapsible-body" id="projectSectionBody">
          <button class="project-create-btn" id="newProjectBtn" type="button">
            <span class="project-create-icon" aria-hidden="true"></span>
            <span>新项目</span>
          </button>
          <div class="project-list" id="projectList"></div>
        </div>
      </div>

      <div class="sidebar-section chat-list-section">
        <div class="sidebar-label sidebar-collapsible-header">
          <span>最近</span>
          <span class="sidebar-header-actions">
            <button class="sidebar-collapse-btn" id="chatSectionToggle" type="button" aria-expanded="true" aria-label="收起你的会话"></button>
          </span>
        </div>
        <div class="sidebar-collapsible-body" id="chatSectionBody">
          <div class="chat-list" id="chatList"></div>
        </div>
      </div>

      <div class="sidebar-user" id="sidebarUser">
        <div class="sidebar-user-main">
          <div class="sidebar-user-avatar" id="sidebarUserAvatar">怀</div>
          <div class="sidebar-user-name" id="sidebarUserName">当前账号</div>
        </div>
        <button class="sidebar-logout-btn" id="logoutBtn" type="button">退出</button>
      </div>
    </aside>

    <main class="workspace">
      <section class="workspace-top">
        <div class="top-left-wrap">
          <button id="mobileMenuBtn" class="mobile-menu-btn">☰</button>
          <div class="workspace-title">
            <div class="chat-title" id="chatTitle">怀仁AI智能体</div>
            <div class="chat-sub" id="chatSub">正在加载上次会话...</div>
          </div>
          <div class="workspace-quick-actions">
            <button id="archiveProjectBtn" class="workspace-ghost-btn" type="button" style="display:none;">移动到项目</button>
          </div>
        </div>

        <div class="workspace-controls">
          <div class="control-group">
            <label for="modelSelect">模型</label>
            <div class="control-input model-select-shell">
              <span id="modelSelectFace" class="model-select-face" aria-hidden="true"></span>
              <select id="modelSelect" class="model-select-native"></select>
            </div>
          </div>

          <div class="control-group" id="imageShowAllWrap" style="display:none !important;">
            <label class="control-checkbox-label" for="showAllImageModelsCb" style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:13px;color:var(--text-sec);">
              <input type="checkbox" id="showAllImageModelsCb" />
              <span>显示全部模型（已默认展示上游全量列表，此项保留兼容）</span>
            </label>
          </div>

          <div class="control-group" id="imageModeWrap" style="display:none !important;" aria-hidden="true">
            <label for="imageModeSelect">图片模式（已移除）</label>
            <select id="imageModeSelect" class="control-input" disabled></select>
          </div>
        </div>
      </section>

      <div class="chat-wrap" id="chatWrap">
        <div class="feed" id="chatFeed"></div>

        <div class="composer">
          <button type="button" class="scroll-to-bottom-btn" id="scrollToBottomBtn" style="display:none;" aria-label="回到底部">
            <svg class="scroll-to-bottom-btn__ic" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>
          </button>
          <div class="notice info" id="infoNotice"></div>
          <div class="notice error" id="errorNotice"></div>

          <input id="fileInput" class="upload-input" type="file" multiple />

          <div class="composer-box is-idle" id="uploadDropZone">
            <div class="attach-strip" id="uploadList"></div>

            <textarea
              id="userInput"
              class="composer-input"
              placeholder="请输入你的内容。"
            ></textarea>

            <div class="composer-bottom">
              <div class="composer-left">
                <div class="composer-toolbar">
                  <button class="attach-btn" id="attachBtn" type="button" aria-label="上传文件">+</button>
                  <div class="badge" id="modeBadge">当前：文本</div>
                  <div class="composer-inline-tools">
                    <div class="composer-toggle-item" id="ragToggleWrap">
                      <label class="composer-switch" for="useRagCb">
                        <input type="checkbox" id="useRagCb" />
                        <span class="composer-switch-track" aria-hidden="true"></span>
                        <span class="composer-switch-label">知识库</span>
                      </label>
                    </div>

                    <div class="composer-toggle-item" id="webSearchToggleWrap">
                      <label class="composer-switch" for="useWebSearchCb">
                        <input type="checkbox" id="useWebSearchCb" />
                        <span class="composer-switch-track" aria-hidden="true"></span>
                        <span class="composer-switch-label">联网</span>
                      </label>
                    </div>

                  </div>
                  <span class="upload-tip" id="uploadTip">可拖拽或 Ctrl+V 粘贴图片</span>
                </div>
              </div>
              <div class="send-actions">
                <div class="composer-select-item composer-select-item--right" id="reasoningModeWrap" style="display:none;">
                  <div class="composer-select-shell composer-select-shell--right">
                    <span class="composer-select-label">模式</span>
                    <span id="reasoningModeFace" class="composer-select-face" aria-hidden="true"></span>
                    <select id="reasoningModeSelect" class="composer-select-native composer-select-native--overlay"></select>
                  </div>
                </div>
                <button class="stop-btn" id="stopBtn" style="display:none;">■ 停止生成</button>
                <button class="send-btn" id="sendBtn" type="button" aria-label="发送消息">
                  <span class="send-btn-icon" aria-hidden="true">↑</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>


  <script src="/static/js/storage.js" defer></script>
  <script src="/static/js/api.js" defer></script>
  <script src="/static/js/renderers/messages.js" defer></script>
  <script src="/static/js/app.js" defer></script>
  <div class="modal-mask" id="projectArchiveModal" aria-hidden="true">
    <div class="modal-card project-archive-modal" role="dialog" aria-modal="true" aria-labelledby="projectArchiveTitle">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="projectArchiveTitle">移动到项目</div>
          <div class="modal-sub" id="projectArchiveSubtitle">将当前聊天移动到某个项目文件夹中</div>
        </div>
        <button id="projectArchiveCloseBtn" class="modal-close-btn" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="modal-label">当前聊天</label>
          <div class="modal-static" id="projectArchiveChatTitle">未选择会话</div>
        </div>
        <div class="modal-field">
          <label class="modal-label" for="projectArchiveSelect">选择已有项目</label>
          <select id="projectArchiveSelect" class="modal-input"></select>
        </div>
        <div class="modal-sep">或</div>
        <div class="modal-field">
          <label class="modal-label" for="projectArchiveNewName">新建项目</label>
          <input id="projectArchiveNewName" class="modal-input" type="text" placeholder="输入新项目名称" />
        </div>
        <div class="modal-feedback" id="projectArchiveFeedback"></div>
      </div>
      <div class="modal-foot">
        <button id="projectArchiveCancelBtn" class="workspace-ghost-btn" type="button">取消</button>
        <button id="projectArchiveOpenBtn" class="workspace-ghost-btn" type="button" style="display:none;">打开项目</button>
        <button id="projectArchiveConfirmBtn" class="workspace-primary-btn" type="button">确认移动</button>
      </div>
    </div>
  </div>
  <div class="modal-mask" id="projectEditorModal" aria-hidden="true">
    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="projectEditorTitle">
      <div class="modal-head">
        <div>
          <div class="modal-title" id="projectEditorTitle">新建项目</div>
          <div class="modal-sub" id="projectEditorSubtitle">输入一个项目名称，创建后会自动切换到该项目。</div>
        </div>
        <button id="projectEditorCloseBtn" class="modal-close-btn" type="button" aria-label="关闭">×</button>
      </div>
      <div class="modal-body">
        <div class="modal-field">
          <label class="modal-label" for="projectEditorName">项目名称</label>
          <input id="projectEditorName" class="modal-input" type="text" placeholder="输入项目名称" />
        </div>
        <div class="modal-feedback" id="projectEditorFeedback"></div>
      </div>
      <div class="modal-foot">
        <button id="projectEditorCancelBtn" class="workspace-ghost-btn" type="button">取消</button>
        <button id="projectEditorConfirmBtn" class="workspace-primary-btn" type="button">确认</button>
      </div>
    </div>
  </div>
  <div id="pageDropOverlay" class="page-drop-overlay" aria-hidden="true">
    <div class="page-drop-overlay-card">
      <div class="page-drop-overlay-title">松开以上传文件</div>
      <div class="page-drop-overlay-sub">文件会添加到当前会话</div>
    </div>
  </div>
  <div id="copyToast" class="copy-toast" role="status" aria-live="polite"></div>
  <div id="sidebarMenuLayer" class="sidebar-menu-layer" hidden></div>
</body>
</html>
