# 示例：Nginx 反代怀仁 AI 中台（uvicorn）
# 默认 proxy_read_timeout 常为 60s，长 prompt 首包慢时会 504，需调大。
# WebSocket 需 map + Upgrade / Connection，否则易回退到阻塞式 POST /api/chat。
#
# 整份文件应在 http { } 内 include（与 sites-enabled 一致）。
# 使用前请把 server_name、ssl_certificate、upstream 等改成你的环境。

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream huairen_backend {
    server 127.0.0.1:8000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name example.com;

    # ssl_certificate     /path/to/fullchain.pem;
    # ssl_certificate_key /path/to/privkey.pem;

    client_max_body_size 100m;

    location / {
        proxy_pass http://huairen_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 75s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;

        # 可选：禁用缓冲，利于流式/WebSocket（按环境测试后启用）
        # proxy_buffering off;
    }
}
