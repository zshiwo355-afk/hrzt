services:
  mysql:
    image: mysql:8.4
    container_name: ai_mid_mysql
    restart: unless-stopped
    ports:
      # 宿主机 3307 → 容器内 MySQL 默认端口 3306（与 .env 里 MYSQL_PORT=3307 一致）
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root123456
      MYSQL_DATABASE: ai_mid_platform
      MYSQL_USER: ai_user
      MYSQL_PASSWORD: ai_user_123456
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: